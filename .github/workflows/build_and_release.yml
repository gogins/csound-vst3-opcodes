name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            runner: macos-latest
            build_dir: build-macos
            cmake_target: verify_dist

          - name: linux
            runner: ubuntu-latest
            build_dir: build-linux
            cmake_target: archive_dist

          - name: windows
            runner: windows-latest
            build_dir: build-windows
            cmake_target: archive_dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libgtkmm-3.0-dev p7zip-full

      - name: Install macOS dependencies
        if: matrix.name == 'macos'
        run: |
          brew install ninja

      - name: Install Windows dependencies
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Import macOS signing certificate
        if: matrix.name == 'macos'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}

      - name: Decode App Store Connect API key
        if: matrix.name == 'macos'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: Configure macOS
        if: matrix.name == 'macos'
        shell: bash
        run: |
          cmake -S vst3-opcodes -B ${{ matrix.build_dir }} -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCSOUND_VST3_OPCODE_SIGN=ON \
            -DCSOUND_VST3_OPCODE_CODESIGN_IDENTITY="${{ secrets.APPLE_CODESIGN_IDENTITY }}" \
            -DCSOUND_VST3_OPCODE_NOTARIZE=ON \
            -DCSOUND_VST3_OPCODE_NOTARY_KEY="$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" \
            -DCSOUND_VST3_OPCODE_NOTARY_KEY_ID="${{ secrets.APPLE_API_KEY_ID }}" \
            -DCSOUND_VST3_OPCODE_NOTARY_ISSUER="${{ secrets.APPLE_API_ISSUER_ID }}"

      - name: Configure Linux
        if: matrix.name == 'linux'
        run: |
          cmake -S vst3-opcodes -B ${{ matrix.build_dir }} -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Configure Windows
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          cmake -S vst3-opcodes -B ${{ matrix.build_dir }} -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DSMTG_USE_STDATOMIC_H=OFF

      - name: Build package target
        run: |
          cmake --build ${{ matrix.build_dir }} --target ${{ matrix.cmake_target }} --verbose

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: csound-vst3-opcodes-${{ matrix.name }}
          path: ${{ matrix.build_dir }}/*.zip
          if-no-files-found: error

      - name: Upload zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.build_dir }}/*.zip