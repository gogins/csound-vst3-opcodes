name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            runner: macos-latest
            build_dir: build-macos
            cmake_target: notarize_dist

          - name: linux
            runner: ubuntu-latest
            build_dir: build-linux
            cmake_target: archive_dist

          - name: windows
            runner: windows-latest
            build_dir: build-windows
            cmake_target: archive_dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential cmake ninja-build pkg-config \
            libgtkmm-3.0-dev p7zip-full \
            libsndfile1-dev libasound2-dev libjack-jackd2-dev \
            libpulse-dev portaudio19-dev liblo-dev \
            libffi-dev libcurl4-openssl-dev \
            libxcb-util-dev \
            libxcb-keysyms1-dev \
            libxcb-image0-dev \
            libxcb-shm0-dev \
            libxcb-icccm4-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-cursor0-dev \
            bison flex

      - name: Install macOS dependencies
        if: matrix.name == 'macos'
        run: |
          brew install cmake ninja libsndfile portaudio bison flex
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix flex)/bin" >> "$GITHUB_PATH"

      - name: Install Windows dependencies
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Install Csound 7 from GitHub on Linux
        if: matrix.name == 'linux'
        run: |
          git clone --depth 1 https://github.com/csound/csound.git
          cmake -S csound -B csound/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DBUILD_JAVA_INTERFACE=OFF \
            -DBUILD_PYTHON_INTERFACE=OFF
          cmake --build csound/build --parallel
          sudo cmake --install csound/build
          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/csound.conf
          sudo ldconfig

      - name: Install Csound 7 from GitHub on macOS
        if: matrix.name == 'macos'
        run: |
          git clone --depth 1 https://github.com/csound/csound.git
          BISON_EXECUTABLE="$(brew --prefix bison)/bin/bison"
          FLEX_EXECUTABLE="$(brew --prefix flex)/bin/flex"
          cmake -S csound -B csound/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBISON_EXECUTABLE="$BISON_EXECUTABLE" \
            -DFLEX_EXECUTABLE="$FLEX_EXECUTABLE" \
            -DBUILD_TESTS=OFF \
            -DBUILD_JAVA_INTERFACE=OFF \
            -DBUILD_PYTHON_INTERFACE=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build csound/build --parallel
          sudo cmake --install csound/build

      - name: Install Csound 7 from GitHub on Windows
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/csound/csound.git

          cmake -S csound -B csound/build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTS=OFF `
            -DBUILD_JAVA_INTERFACE=OFF `
            -DBUILD_PYTHON_INTERFACE=OFF `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/csound-install"

          cmake --build csound/build --parallel
          cmake --install csound/build

          echo "$env:RUNNER_TEMP/csound-install/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Import macOS signing certificate
        if: matrix.name == 'macos'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}

      - name: Decode App Store Connect API key
        if: matrix.name == 'macos'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: Configure macOS
        if: matrix.name == 'macos'
        shell: bash
        run: |
          cmake -S vst3-opcodes -B ${{ matrix.build_dir }} -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="/usr/local;/usr;/Library/Frameworks" \
            -DCSOUND_VST3_OPCODE_SIGN=ON \
            -DCSOUND_VST3_OPCODE_CODESIGN_IDENTITY="${{ secrets.APPLE_CODESIGN_IDENTITY }}" \
            -DCSOUND_VST3_OPCODE_NOTARIZE=ON \
            -DCSOUND_VST3_OPCODE_NOTARY_KEY="$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" \
            -DCSOUND_VST3_OPCODE_NOTARY_KEY_ID="${{ secrets.APPLE_API_KEY_ID }}" \
            -DCSOUND_VST3_OPCODE_NOTARY_ISSUER="${{ secrets.APPLE_API_ISSUER_ID }}"

      - name: Configure Linux
        if: matrix.name == 'linux'
        run: |
          cmake -S vst3-opcodes -B ${{ matrix.build_dir }} -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="/usr/local;/usr"

      - name: Configure Windows
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          cmake -S vst3-opcodes -B ${{ matrix.build_dir }} -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP/csound-install" `
            -DCSOUND_ROOT_HINT="$env:RUNNER_TEMP/csound-install" `
            -DSMTG_USE_STDATOMIC_H=OFF

      - name: Build package target
        run: |
          cmake --build ${{ matrix.build_dir }} --target ${{ matrix.cmake_target }} --verbose

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: csound-vst3-opcodes-${{ matrix.name }}
          path: ${{ matrix.build_dir }}/*.zip
          if-no-files-found: error

      - name: Upload zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.build_dir }}/*.zip